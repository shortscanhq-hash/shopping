name: Shoe Deal Scanner

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      price_threshold:
        description: "Max price to alert on (default: 70)"
        required: false
        default: "70"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          PRICE_THRESHOLD: ${{ github.event.inputs.price_threshold || '70' }}
        run: python .github/workflows/src/scanner.py

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: scan_results.json
          retention-days: 30
